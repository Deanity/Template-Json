<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Config Generator</title>
  <link rel="shortcut icon" href="https://cdn.discordapp.com/avatars/1331944037908742205/2c43a3ba3956e06229bf73cb0a04b632.png?size=256" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="container fade-in-up">
    <!-- Left form container -->
    <div class="card form-container slide-in-left">
      <div class="header">
        <h1><i class="fas fa-sliders-h gradient-text"></i> Boolua Config</h1>
        <p>Generate your JSON configurations instantly</p>
      </div>

      <div class="input-group">
        <label for="token">Token</label>
        <div class="input-wrapper">
          <i class="fas fa-key icon"></i>
          <input type="text" id="token" placeholder="Enter secure token">
        </div>
      </div>

      <div class="section-title">
        <h3><i class="fas fa-layer-group"></i> Channels</h3>
        <button type="button" class="btn-icon add-btn" id="addChannel" aria-label="Add Channel" title="Add Channel">
          <i class="fas fa-plus"></i> Add
        </button>
      </div>
      
      <div id="channelsContainer"></div>

      <div class="input-group mt-3">
        <label for="webhook">Webhook URL</label>
        <div class="input-wrapper">
          <i class="fas fa-link icon"></i>
          <input type="text" id="webhook" placeholder="https://...">
        </div>
      </div>

      <div class="button-row">
        <button type="button" id="generateBtn" class="btn-primary">
          <i class="fas fa-download"></i> Generate JSON
        </button>
      </div>
    </div>

    <!-- Right preview container -->
    <div class="card preview-container slide-in-right">
      <div class="preview-header">
        <h3><i class="fas fa-code"></i> Live Preview</h3>
        <button type="button" id="copyBtn" class="btn-icon" aria-label="Copy to Clipboard">
          <i class="fas fa-copy"></i> Copy
        </button>
      </div>
      <div class="pre-wrapper scrollable">
        <pre id="jsonPreview">{}</pre>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
